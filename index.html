<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Reserve a Table — Foothills Retreat</title>
  <meta name="description" content="Book your table at Foothills Retreat. Choose your shift and reserve in seconds." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- Open Graph -->
  <meta property="og:title" content="Foothills Retreat — Table Reservations" />
  <meta property="og:description" content="Reserve your table online. Lunch & Dinner shifts available." />
</head>

<body>

  <!-- Loader -->
  <div class="loader-overlay" id="loader" role="status" aria-label="Loading">
    <div class="loader-spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <main class="login-page">

    <!-- Left decorative art panel -->
    <aside class="login-art" aria-hidden="true">
      <div class="login-art-content">
        <span class="brand-mark">Est. 2018 &nbsp;·&nbsp; Fine Dining</span>
        <h1>A table for<br />every occasion.</h1>
        <p>Reserve your perfect spot for lunch or dinner. Simple, fast, and always confirmed.</p>
      </div>
    </aside>

    <!-- Right login form -->
    <section class="login-form-panel">
      <div class="panel-heading">
        <h2>Foothills Retreat</h2>
        <p>Enter your name and contact to continue</p>
      </div>

      <form id="login-form" novalidate autocomplete="off">
        <div class="form-group">
          <label for="input-name">Full Name</label>
          <input type="text" id="input-name" name="name" placeholder="e.g. Ankit Sharma" autocomplete="name" required />
        </div>

        <div class="form-group">
          <label for="input-contact">Contact Number</label>
          <input type="tel" id="input-contact" name="contact" placeholder="10-digit mobile number" maxlength="10"
            autocomplete="tel" required />
        </div>

        <button type="submit" class="btn-primary" id="login-btn">
          Enter Restaurant &rarr;
        </button>
      </form>

      <div class="admin-link">
        Staff member? <a href="admin.html">Admin Panel &rarr;</a>
      </div>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
